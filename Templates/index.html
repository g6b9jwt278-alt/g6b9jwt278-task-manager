<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Task Manager</a>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Search and Filter -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-5">
                        <input type="text" id="searchInput" class="form-control" placeholder="Search tasks...">
                    </div>
                    <div class="col-md-3">
                        <select id="priorityFilter" class="form-select">
                            <option value="All">All Priorities</option>
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select id="statusFilter" class="form-select">
                            <option value="All">All Status</option>
                            <option value="Pending">Pending</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div class="col-md-1">
                        <button onclick="clearFilters()" class="btn btn-outline-secondary w-100">Clear</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add New Task -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-light">
                <h5 class="mb-0">Add New Task</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <input type="text" id="titleInput" class="form-control" placeholder="Task title *" required>
                    </div>
                    <div class="col-md-3">
                        <input type="date" id="dueDateInput" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <select id="priorityInput" class="form-select">
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <textarea id="descriptionInput" class="form-control" rows="2" placeholder="Description (optional)"></textarea>
                    </div>
                    <div class="col-12">
                        <button onclick="addTask()" class="btn btn-success">Add Task</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Task List -->
        <div class="card shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Tasks</h5>
                <span id="taskCount" class="badge bg-secondary">0 tasks</span>
            </div>
            <div class="card-body p-0">
                <div id="taskList" class="list-group list-group-flush">
                    <!-- Tasks will be loaded here by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
