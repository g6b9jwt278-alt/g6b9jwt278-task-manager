<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1>Task Manager - Test Version</h1>

    <div class="card mb-4">
        <div class="card-body">
            <h5>Add Task</h5>
            <input type="text" id="titleInput" class="form-control mb-2" placeholder="Task title">
            <input type="date" id="dueDateInput" class="form-control mb-2">
            <button onclick="addTask()" class="btn btn-success">Add Task</button>
        </div>
    </div>

    <div id="taskList"></div>

    <script>
        const API_URL = '/api/tasks';

        async function loadTasks() {
            const res = await fetch(API_URL);
            const tasks = await res.json();
            const div = document.getElementById('taskList');
            div.innerHTML = '<h5>Tasks:</h5>';

            tasks.forEach(t => {
                const item = document.createElement('div');
                item.innerHTML = `${t.title} - Due: ${t.due_date || 'None'} <small>(${t.priority})</small>`;
                div.appendChild(item);
            });
        }

        async function addTask() {
            const title = document.getElementById('titleInput').value.trim();
            if (!title) return alert("Enter a title");

            await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    title: title,
                    due_date: document.getElementById('dueDateInput').value 
                })
            });

            document.getElementById('titleInput').value = '';
            document.getElementById('dueDateInput').value = '';
            loadTasks();
        }

        window.onload = loadTasks;
    </script>
</body>
</html>
