<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1 class="mb-4">Task Manager</h1>

    <!-- Add Task -->
    <div class="card mb-4">
        <div class="card-body">
            <h5>Add New Task</h5>
            <div class="input-group">
                <input type="text" id="titleInput" class="form-control" placeholder="Enter task title">
                <button onclick="addTask()" class="btn btn-success">Add Task</button>
            </div>
        </div>
    </div>

    <!-- Task List -->
    <h5>Your Tasks</h5>
    <div id="taskList" class="list-group"></div>

    <script>
        const API_URL = '/api/tasks';

        async function loadTasks() {
            const res = await fetch(API_URL);
            const tasks = await res.json();
            const container = document.getElementById('taskList');
            container.innerHTML = '';

            if (tasks.length === 0) {
                container.innerHTML = `<p class="text-muted">No tasks yet.</p>`;
                return;
            }

            tasks.forEach(task => {
                const item = document.createElement('div');
                item.className = `list-group-item d-flex justify-content-between align-items-center ${task.completed ? 'list-group-item-success' : ''}`;
                item.innerHTML = `
                    <span>${task.title}</span>
                    <div>
                        <button onclick="toggleComplete(${task.id})" class="btn btn-sm ${task.completed ? 'btn-warning' : 'btn-success'} me-1">
                            ${task.completed ? 'Undo' : 'Complete'}
                        </button>
                        <button onclick="deleteTask(${task.id})" class="btn btn-sm btn-danger">Delete</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        async function addTask() {
            const title = document.getElementById('titleInput').value.trim();
            if (!title) return alert("Please enter a title");

            await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ title: title })
            });

            document.getElementById('titleInput').value = '';
            loadTasks();
        }

        async function toggleComplete(id) {
            await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ completed: true })
            });
            loadTasks();
        }

        async function deleteTask(id) {
            if (confirm("Delete this task?")) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                loadTasks();
            }
        }

        window.onload = loadTasks;
    </script>
</body>
</html>
