<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1 class="mb-4">Task Manager</h1>

    <!-- Add Task -->
    <div class="card mb-4">
        <div class="card-body">
            <h5>Add New Task</h5>
            <div class="input-group">
                <input type="text" id="titleInput" class="form-control" placeholder="Enter task title">
                <button onclick="addTask()" class="btn btn-success">Add Task</button>
            </div>
        </div>
    </div>

    <!-- Task List -->
    <h5>Your Tasks</h5>
    <div id="taskList" class="list-group"></div>

    <script>
        const API_URL = '/api/tasks';

        async function loadTasks() {
            try {
                const res = await fetch(API_URL);
                const tasks = await res.json();
                const container = document.getElementById('taskList');
                container.innerHTML = '';

                if (tasks.length === 0) {
                    container.innerHTML = `<p class="text-muted">No tasks yet.</p>`;
                    return;
                }

                tasks.forEach(task => {
                    const item = document.createElement('div');
                    item.className = 'list-group-item';
                    item.innerHTML = `
                        ${task.title} 
                        <span class="badge bg-secondary">${task.priority}</span>
                    `;
                    container.appendChild(item);
                });
            } catch (e) {
                console.error(e);
            }
        }

        async function addTask() {
            const title = document.getElementById('titleInput').value.trim();
            if (!title) return alert("Please enter a title");

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ title: title })
                });

                if (res.ok) {
                    document.getElementById('titleInput').value = '';
                    loadTasks();
                } else {
                    alert("Failed to add task");
                }
            } catch (e) {
                alert("Error connecting to server");
            }
        }

        // Load tasks on page load
        window.onload = loadTasks;
    </script>
</body>
</html>
