<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .task-card { transition: all 0.2s; }
        .task-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .completed { text-decoration: line-through; opacity: 0.75; }
        .overdue { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold">Task Manager</span>
        </div>
    </nav>

    <div class="container">

        <!-- Search & Filter -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-5">
                        <input type="text" id="searchInput" class="form-control" placeholder="Search tasks..." onkeyup="loadTasks()">
                    </div>
                    <div class="col-md-3">
                        <select id="priorityFilter" class="form-select" onchange="loadTasks()">
                            <option value="All">All Priorities</option>
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select id="statusFilter" class="form-select" onchange="loadTasks()">
                            <option value="All">All Status</option>
                            <option value="Pending">Pending</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div class="col-md-1">
                        <button onclick="clearFilters()" class="btn btn-outline-secondary w-100">Clear</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add New Task -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h5>Add New Task</h5>
                <div class="row g-3">
                    <div class="col-md-5">
                        <input type="text" id="titleInput" class="form-control" placeholder="What needs to be done?">
                    </div>
                    <div class="col-md-3">
                        <select id="priorityInput" class="form-select">
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <input type="date" id="dueDateInput" class="form-control">
                    </div>
                    <div class="col-md-2">
                        <button onclick="addTask()" class="btn btn-success w-100">Add Task</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Task List -->
        <div id="taskList"></div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editTaskId">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" id="editTitle" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Due Date</label>
                        <input type="date" id="editDueDate" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Priority</label>
                        <select id="editPriority" class="form-select">
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = '/api/tasks';

        async function loadTasks() {
            const search = document.getElementById('searchInput').value.trim();
            const priority = document.getElementById('priorityFilter').value;
            const status = document.getElementById('statusFilter').value;

            let url = API_URL;
            const params = new URLSearchParams();
            if (search) params.append('search', search);
            if (priority !== 'All') params.append('priority', priority);
            if (status !== 'All') params.append('status', status);
            if (params.toString()) url += '?' + params.toString();

            const res = await fetch(url);
            const tasks = await res.json();
            const container = document.getElementById('taskList');
            container.innerHTML = '';

            if (tasks.length === 0) {
                container.innerHTML = `<p class="text-center text-muted py-5">No tasks found.</p>`;
                return;
            }

            tasks.forEach(task => {
                const isOverdue = task.due_date && new Date(task.due_date) < new Date() && !task.completed;
                const card = document.createElement('div');
                card.className = `card mb-3 task-card ${task.completed ? 'border-success' : ''}`;
                card.innerHTML = `
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h5 class="${task.completed ? 'completed' : ''}">${task.title}</h5>
                                <span class="badge bg-${task.priority === 'High' ? 'danger' : task.priority === 'Medium' ?
