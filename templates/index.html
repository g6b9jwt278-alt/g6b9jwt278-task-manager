<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1>Task Manager</h1>

    <div class="input-group mb-4">
        <input type="text" id="titleInput" class="form-control" placeholder="New task">
        <button onclick="addTask()" class="btn btn-success">Add</button>
    </div>

    <div id="taskList"></div>

    <script>
        const API_URL = '/api/tasks';

        async function loadTasks() {
            const res = await fetch(API_URL);
            const tasks = await res.json();
            const div = document.getElementById('taskList');
            div.innerHTML = '';

            tasks.forEach(t => {
                const item = document.createElement('div');
                item.className = `list-group-item d-flex justify-content-between ${t.completed ? 'list-group-item-success' : ''}`;
                item.innerHTML = `
                    ${t.title}
                    <div>
                        <button onclick="toggle(${t.id})" class="btn btn-sm ${t.completed ? 'btn-warning' : 'btn-success'}">Complete</button>
                        <button onclick="del(${t.id})" class="btn btn-sm btn-danger">Delete</button>
                    </div>
                `;
                div.appendChild(item);
            });
        }

        async function addTask() {
            const title = document.getElementById('titleInput').value.trim();
            if (!title) return;
            await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title})
            });
            document.getElementById('titleInput').value = '';
            loadTasks();
        }

        async function toggle(id) {
            await fetch(`${API_URL}/${id}`, { method: 'PUT' });
            loadTasks();
        }

        async function del(id) {
            if (confirm("Delete?")) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                loadTasks();
            }
        }

        window.onload = loadTasks;
    </script>
</body>
</html>
