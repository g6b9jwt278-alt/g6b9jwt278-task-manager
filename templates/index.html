<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .task-card { transition: all 0.2s; }
        .task-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .completed { text-decoration: line-through; opacity: 0.75; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold">Task Manager</span>
        </div>
    </nav>

    <div class="container">

        <!-- Add New Task -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h5>Add New Task</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <input type="text" id="titleInput" class="form-control" placeholder="What needs to be done?">
                    </div>
                    <div class="col-md-3">
                        <select id="priorityInput" class="form-select">
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button onclick="addTask()" class="btn btn-success w-100">Add Task</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Task List -->
        <div id="taskList"></div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editTaskId">
                    <div class="mb-3">
                        <label class
