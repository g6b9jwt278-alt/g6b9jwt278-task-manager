{% extends "base.html" %}

{% block content %}
<h2>Add New Task</h2>
<form method="POST" action="{{ url_for('add_task') }}">
    <input type="text" name="title" placeholder="Task title" required>
    <button type="submit">Add Task</button>
</form>

<h3>Your Tasks</h3>
<ul>
    {% for task in tasks %}
        <li>{{ task.title }} - {{ task.priority }}</li>
    {% endfor %}
</ul>
{% endblock %}
